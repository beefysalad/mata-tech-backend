name: Open PR (main -> prod)

on:
  workflow_dispatch:
    inputs:
      title:
        description: "PR title"
        required: false
        default: "chore: sync main to prod"
      body:
        description: "PR body"
        required: false
        default: "Automated PR from main to prod."

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR from main to prod
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = "main";
            const base = "prod";
            const title = "${{ inputs.title }}";
            const body = "${{ inputs.body }}";

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base,
            });

            if (existing.data.length > 0) {
              core.info(`PR already open: ${existing.data[0].html_url}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              body,
              head,
              base,
            });

            core.info(`Created PR: ${pr.data.html_url}`);
